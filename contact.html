<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ducktrshessami - Contact</title>
    <link rel="icon" href="./favicon.ico">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/contact.css">
</head>
<body>
    <header>
        <!-- Nav for desktop -->
        <nav class="nav-wrapper">
            <a href="./index.html" class="left hide-on-small-only">
                <img src="./assets/images/logo.png" alt="Logo" class="logo circle middle">
                <span>ducktrshessami</span>
            </a>
            <ul class="left hide-on-small-only">
                <li><a href="./portfolio.html">Portfolio</a></li>
                <li><a class="active">Contact</a></li>
            </ul>
            <span class="brand-logo center hide-on-med-and-up">Contact</span>
            <a role="button" data-target="sidenav" class="sidenav-trigger right hide-on-med-and-up"><i class="material-icons">menu</i></a>
        </nav>
        <!-- Sidebar nav for mobile -->
        <ul id="sidenav" class="sidenav">
            <li><a href="./index.html">About Me</a></li>
            <li><a href="./portfolio.html">Portfolio</a></li>
            <li><a class="disabled">Contact</a></li>
        </ul>
    </header>
    <main>
        <!-- Contact form -->
        <section class="row">
            <div class="card blue-grey darken-4 white-text col s12 m8 offset-m2 l6 offset-l3">
                <div class="card-content">
                    <div class="hide-on-small-only">
                        <h1 class="card-title">Contact</h1>
                        <hr>
                        <br>
                    </div>
                    <form id="contact-form">
                        <div class="input-field">
                            <input type="text" id="name" name="name" class="validate white-text">
                            <label for="name">Name</label>
                        </div>
                        <div class="input-field">
                            <input type="text" name="email" id="email" class="validate white-text">
                            <label for="email">E-Mail</label>
                        </div>
                        <div class="input-field">
                            <textarea name="message" id="message" class="materialize-textarea validate white-text"></textarea>
                            <label for="message">Message</label>
                        </div>
                        <button type="submit" form="contact-form" id="submit" class="btn waves-effect waves-dark black-text">Submit</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <footer class="center middle">
        <span>© Copyright 2020 ducktrshessami</span>
    </footer>

    <!-- JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js" integrity="sha512-bLT0Qm9VnAYZDflyKcBaQ2gg0hSYNQrJ8RilYldYQ1FxQYoCLtUjuuRuZo+fjqhx/qtq/1itJ0C2ejDxltZVFg==" crossorigin="anonymous"></script>
    <script src="./assets/scripts/navbar.js"></script>
    <script src="./assets/scripts/contact.js"></script>
</body>
</html>
